<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oficina de Pendientes Tecnicos</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1c1d22;
        --muted: #5f6470;
        --paper: #fffaf2;
        --panel: #ffffff;
        --accent: #007c89;
        --accent-strong: #005d66;
        --line: #d8d0c2;
        --warning: #f0b429;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        background: var(--paper);
      }

      header {
        padding: 64px 24px 40px;
        background: #e9f7f8;
        border-bottom: 1px solid var(--line);
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        max-width: 780px;
        margin-bottom: 12px;
        font-size: 40px;
        line-height: 1.1;
      }

      .intro {
        max-width: 680px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      button,
      .button {
        border: 0;
        border-radius: 6px;
        padding: 12px 16px;
        color: #ffffff;
        background: var(--accent);
        font-weight: 700;
        cursor: pointer;
      }

      button:hover,
      .button:hover {
        background: var(--accent-strong);
      }

      section {
        margin-top: 32px;
      }

      .notice {
        padding: 16px;
        border: 1px solid var(--line);
        border-left: 6px solid var(--warning);
        border-radius: 6px;
        background: var(--panel);
      }

      footer {
        padding: 24px;
        text-align: center;
        border-top: 1px solid var(--line);
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Centro de Pendientes Técnicos</h1>
      <p class="intro">Tramitamos explicaciones preventivas para incidentes que todavía nadie entiende.</p>
      <div class="actions">
        <button id="boton-hero" type="button">Pedir una explicación</button>
      </div>
    </header>

    <main>
      <section class="notice" aria-labelledby="aviso-inicial">
        <h2 id="aviso-inicial">Aviso institucional</h2>
        <p>Esta página es el punto de partida del examen. Cambia únicamente lo solicitado en cada misión.</p>
      </section>
    </main>

    <footer>
      <button id="boton-envio-rapido" type="button">Enbiar excusa</button>
    </footer>
  </body>
</html>
